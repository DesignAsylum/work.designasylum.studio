<!-- Design-system fallback tokens: defined BEFORE the _ds stylesheet so that
     when _ds loads it overrides these, but if _ds is unavailable (404/503) the
     site still has working colors/spacing instead of undefined variables. -->
<style>
  :root {
    --color-paper-white: #ffffff;
    --color-obsidian-ink: #15131a;
    --color-graphite: #6b6770;
    --color-ash: #e3e1e6;
    --color-iris-voltage: #3b3df0;
    --color-solar-bloom: #ffc24a;
    --color-block-ink: #161320;
    --color-block-iris: #516fea;
    --color-block-maroon: #5a1f2a;
    --color-block-solar: #ffd36b;
    --color-block-teal: #96ebeb;
    --section-pad-y: clamp(64px, 8vw, 120px);
  }
</style>

<!-- Design Asylum design system -->
<link rel="stylesheet" href="_ds/design-asylum-studio-v3-5943145e-1a4f-4091-8df6-de00e686edbf/styles.css" />
<script src="_ds/design-asylum-studio-v3-5943145e-1a4f-4091-8df6-de00e686edbf/_ds_bundle.js"></script>

<style>
  /* Blinker = Regular 400 only (design-system rule): remap heavier Blinker
     faces to the 400 master so any weight (incl. DS bundle) renders Regular. */
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:500; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:600; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:700; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:800; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:900; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }

  :root {
    --da-gutter: 40px;
    --page-max-width: 1500px;
    --gutter: clamp(16px, 3vw, 40px);
    --radius-cards: 0px;
    --radius-body-blocks: 0px;
    /* Force all type to sans-serif (overrides the _ds serif display/body faces) */
    --font-display: 'Blinker', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-serif: 'Blinker', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-width: 1180px;
    background: var(--color-paper-white);
    color: var(--color-obsidian-ink);
    font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
    font-synthesis: none;
  }
  ::selection { background: var(--color-solar-bloom); color: var(--color-obsidian-ink); }
  #root *, #root *::before, #root *::after { font-style: normal !important; }

  .da-wrap { max-width: var(--page-max-width); margin: 0 auto; padding-left: var(--da-gutter); padding-right: var(--da-gutter); }
  #root h2 { font-weight: 400; }

  /* reveal */
  .sl-reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
  .sl-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .sl-reveal { opacity: 1; transform: none; transition: none; } }

  /* breadcrumb / mail (shared class names used by SLFooter) */
  .sl-crumb { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; }
  .sl-crumb a { text-decoration: none; }
  .sl-crumb-sep { font-size: 13px; }
  .da-mail { text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .da-mail .da-mail-arrow { display: inline-block; transition: transform .2s ease; }
  .da-mail:hover .da-mail-arrow { transform: translate(3px, -3px); }

  /* ---- e-commerce layout: filter sidebar + project grid ---- */
  .cap-layout { display: grid; grid-template-columns: 260px 1fr; gap: clamp(24px, 3vw, 48px); align-items: start; }

  /* ---- filter sidebar ---- */
  .cap-filters { position: sticky; top: 96px; align-self: start; }
  .cap-filters-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding-bottom: 16px; margin-bottom: 20px; border-bottom: 1px solid var(--color-ash); }
  .cap-filters-count { font-family: var(--font-serif); font-size: 14px; color: var(--color-graphite); }
  .cap-filter-clear { appearance: none; background: none; border: none; padding: 0; cursor: pointer; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; color: var(--color-graphite); border-bottom: 1px solid transparent; transition: color .2s ease, border-color .2s ease; }
  .cap-filter-clear:hover { color: var(--color-iris-voltage); border-bottom-color: var(--color-iris-voltage); }
  .cap-filter-clear:disabled { opacity: 0.4; cursor: default; }

  /* selected-filter chips (outlined) */
  .cap-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 24px; }
  .cap-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 8px 6px 12px; background: var(--color-paper-white); border: 1px solid var(--color-obsidian-ink); color: var(--color-obsidian-ink); font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; transition: border-color .15s ease, color .15s ease; }
  .cap-chip:hover { border-color: var(--color-iris-voltage); color: var(--color-iris-voltage); }
  .cap-chip-x { appearance: none; background: none; border: none; padding: 0; margin: 0; cursor: pointer; color: currentColor; font-size: 15px; line-height: 1; display: inline-flex; opacity: 0.7; transition: opacity .15s ease; }
  .cap-chip-x:hover { opacity: 1; }
  .cap-chips-clear { appearance: none; background: none; border: none; padding: 6px 4px; cursor: pointer; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; color: var(--color-graphite); border-bottom: 1px solid transparent; transition: color .2s ease, border-color .2s ease; }
  .cap-chips-clear:hover { color: var(--color-iris-voltage); border-bottom-color: var(--color-iris-voltage); }

  /* accordion filter groups */
  .cap-filter-group { border-bottom: 1px solid var(--color-ash); }
  .cap-filter-head { width: 100%; appearance: none; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 0; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; color: var(--color-obsidian-ink); text-align: left; }
  .cap-filter-head:hover { color: var(--color-iris-voltage); }
  .cap-filter-head-label { display: inline-flex; align-items: center; gap: 8px; }
  .cap-filter-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px; padding: 0 5px; background: var(--color-iris-voltage); color: var(--color-paper-white); font-size: 10px; border-radius: 8px; }
  .cap-filter-chevron { transition: transform .2s ease; font-size: 10px; }
  .cap-filter-group.is-open .cap-filter-chevron { transform: rotate(180deg); }
  .cap-filter-opts { display: flex; flex-direction: column; gap: 11px; padding: 2px 0 18px; }
  .cap-filter-opt { display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: var(--font-serif); font-size: 15px; color: var(--color-graphite); line-height: 1.2; transition: color .15s ease; }
  .cap-filter-opt:hover { color: var(--color-iris-voltage); }
  /* the real input is visually hidden but stays focusable; the visible box is a
     span we fully control, so design-system input resets can't blank it out */
  .cap-filter-opt input { position: absolute; width: 1px; height: 1px; opacity: 0; margin: 0; pointer-events: none; }
  .cap-check { flex: 0 0 18px; width: 18px; height: 18px; box-sizing: border-box; display: inline-block; position: relative; border: 1.5px solid var(--color-graphite); background: var(--color-paper-white); transition: background .15s ease, border-color .15s ease; }
  .cap-filter-opt:hover .cap-check { border-color: var(--color-iris-voltage); }
  .cap-filter-opt input:checked + .cap-check { background: var(--color-iris-voltage); border-color: var(--color-iris-voltage); }
  .cap-filter-opt input:checked + .cap-check::after { content: ''; position: absolute; left: 5px; top: 1px; width: 5px; height: 9px; border: solid var(--color-paper-white); border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .cap-filter-opt input:focus-visible + .cap-check { outline: 2px solid var(--color-iris-voltage); outline-offset: 2px; }
  .cap-filter-opt.is-on { color: var(--color-obsidian-ink); }

  /* ---- project grid (2 per row) ---- */
  .cap-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px 24px; }
  .cap-empty { font-family: var(--font-serif); font-size: 18px; color: var(--color-graphite); padding: 40px 0; }
  .cap-tile { display: flex; flex-direction: column; text-decoration: none; }
  .cap-tile-cover { position: relative; width: 100%; aspect-ratio: 16 / 10; overflow: hidden; }
  .cap-tile-glow { position: absolute; inset: 0; background: radial-gradient(90% 130% at 18% 16%, rgba(255,194,64,0.40), transparent 52%), radial-gradient(90% 130% at 86% 88%, rgba(81,111,234,0.44), transparent 52%), radial-gradient(60% 100% at 60% 30%, rgba(150,235,235,0.24), transparent 56%); }
  .cap-tile-word { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.02em; font-size: clamp(26px, 2.6vw, 44px); }
  .cap-tile-body { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .cap-tile-meta { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .cap-tile-name { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: -0.01em; font-size: 19px; color: var(--color-obsidian-ink); }
  .cap-tile-size { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; color: var(--color-graphite); }
  .cap-tile-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .cap-tag { font-family: var(--font-display); font-weight: 400; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 9px; border: 1px solid var(--color-ash); color: var(--color-graphite); white-space: nowrap; }
  .cap-tile-desc { font-family: var(--font-serif); font-size: 15px; line-height: 1.5; color: var(--color-graphite); margin: 0; }
  .cap-tile-highlights { display: flex; flex-wrap: wrap; gap: 10px 24px; margin-top: 2px; }
  .cap-highlight { display: flex; align-items: baseline; gap: 8px; }
  .cap-highlight-dot { width: 6px; height: 6px; flex: 0 0 6px; background: var(--color-iris-voltage); border-radius: 50%; transform: translateY(-1px); }
  .cap-highlight-label { font-family: var(--font-serif); font-size: 14px; line-height: 1.3; color: var(--color-obsidian-ink); }

  /* all tiles are interactive */
  .cap-tile.is-live { cursor: pointer; }
  .cap-tile.is-live .cap-tile-cover { transition: transform .25s ease, box-shadow .25s ease; }
  .cap-tile-cta { position: absolute; right: 16px; bottom: 16px; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.7); color: var(--color-paper-white); padding: 9px 15px; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; white-space: nowrap; opacity: 0; transform: translateY(6px); transition: opacity .25s ease, transform .25s ease; }
  /* keyboard accessibility: clear focus ring on the whole card */
  .cap-tile.is-live:focus-visible { outline: 2px solid var(--color-iris-voltage); outline-offset: 4px; }
  .cap-tile.is-live:focus-visible .cap-tile-cta { opacity: 1; transform: none; }
  /* hover affordances only where a real pointer can hover */
  @media (hover: hover) {
    .cap-tile.is-live:hover .cap-tile-cover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(20,19,26,0.16); }
    .cap-tile.is-live:hover .cap-tile-name { color: var(--color-iris-voltage); }
    .cap-tile.is-live:hover .cap-tile-cta { opacity: 1; transform: none; }
  }
  /* touch devices never hover: keep the CTA visible so the affordance isn't lost */
  @media (hover: none) {
    .cap-tile-cta { opacity: 1; transform: none; }
  }

  /* ---- mobile filter sheet (hidden on desktop) ---- */
  .cap-mobile-bar { display: none; }
  .cap-filter-trigger { display: none; }
  .cap-sheet-head, .cap-sheet-foot { display: none; }
  .cap-sheet-backdrop { display: none; }

  /* ---- responsive ---- */
  /* below the two-column breakpoint, cards stack one-up */
  @media (max-width: 1320px) { .cap-grid { grid-template-columns: 1fr; } }
  /* tablet / mobile: drop the desktop min-width; filters become a bottom sheet */
  @media (max-width: 900px) {
    body { min-width: 0; }
    .cap-layout { grid-template-columns: 1fr; gap: 0; }
    header.da-wrap { padding-top: 120px; }

    /* trigger bar above the grid */
    .cap-mobile-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .cap-filter-trigger { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border: 1px solid var(--color-obsidian-ink); background: var(--color-paper-white); color: var(--color-obsidian-ink); font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; cursor: pointer; }
    .cap-filter-trigger:active { background: var(--color-obsidian-ink); color: var(--color-paper-white); }
    .cap-filter-trigger .cap-filter-badge { background: var(--color-iris-voltage); color: var(--color-paper-white); }

    /* the filter panel becomes a bottom sheet */
    .cap-filters { position: fixed; left: 0; right: 0; bottom: 0; top: auto; margin: 0; z-index: 200; max-height: 86vh; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--color-paper-white); border-top-left-radius: 16px; border-top-right-radius: 16px; box-shadow: 0 -14px 44px rgba(20,19,26,0.20); padding: 0 var(--da-gutter) calc(env(safe-area-inset-bottom, 0px)); transform: translateY(100%); transition: transform .3s cubic-bezier(.22,.61,.36,1); }
    .cap-filters.is-open { transform: translateY(0); }

    /* sheet chrome */
    .cap-sheet-backdrop { display: block; position: fixed; inset: 0; z-index: 199; background: rgba(20,19,26,0.45); opacity: 0; pointer-events: none; transition: opacity .3s ease; }
    .cap-sheet-backdrop.is-open { opacity: 1; pointer-events: auto; }
    .cap-sheet-head { display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1; background: var(--color-paper-white); padding: 18px 0 14px; }
    .cap-sheet-title { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; color: var(--color-obsidian-ink); }
    .cap-sheet-close { appearance: none; background: none; border: none; cursor: pointer; font-size: 26px; line-height: 1; color: var(--color-obsidian-ink); padding: 0 4px; }
    .cap-sheet-foot { display: block; position: sticky; bottom: 0; background: var(--color-paper-white); padding: 14px 0 18px; border-top: 1px solid var(--color-ash); }
    .cap-sheet-apply { width: 100%; padding: 15px; border: none; cursor: pointer; background: var(--color-iris-voltage); color: var(--color-paper-white); font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; font-size: 13px; }

    /* keep the count + Clear filters row inside the sheet (below the sticky head) */
    .cap-filters-head { margin-bottom: 4px; padding-top: 4px; }
  }
  @media (max-width: 560px) {
    .cap-tile-cover { aspect-ratio: 3 / 2; }
    .cap-chips { gap: 6px; }
  }

  @media (min-width: 1728px) { :root { --page-max-width: 1680px; --da-gutter: 56px; } }
  @media (min-width: 2240px) { :root { --page-max-width: 2080px; --da-gutter: 80px; } }
</style>
</head>

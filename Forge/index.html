(function () {
  const CLIENT = 'Forge';
  const SERVICE = 'Branding';

  function HubPage() {
    window.useReveal();
    return (
      <React.Fragment>
        <SLNav />
        <header className="da-wrap sl-reveal" style={{ paddingTop: 150 }}>
          <div style={{ marginBottom: 24 }}><Eyebrow>{SERVICE}</Eyebrow></div>
          <h1 style={{ margin: 0, fontFamily: 'var(--font-display)', fontWeight: 400, letterSpacing: '-0.025em', lineHeight: 1.0, fontSize: 'clamp(40px,5vw,84px)', color: 'var(--color-obsidian-ink)' }}>

            This hub is coming soon. Check back for project deliverables, assets, and feedback tools.
          </p>
        </header>
        <SLFooter trail={[{ label: 'Home', href: '/' }, { label: 'Capabilities', href: '/' }, { label: CLIENT }]} />
      </React.Fragment>
    );
  }

  function mount() {
    const ready = window.ReactDOM && window.SLNav && window.SLFooter && window.useReveal && window.Eyebrow;
    if (!ready) { return setTimeout(mount, 50); }
    ReactDOM.createRoot(document.getElementById('root')).render(<HubPage />);
  }
  mount();
})();
